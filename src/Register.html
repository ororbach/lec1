<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <form id="registerForm" action="/src/register.html" method="post" class="space-y-4">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Register</h2>
            
            <div>
                <input type="text" 
                       id="userInput"
                       required 
                       placeholder="Enter username" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <div>
                <input type="email" 
                       id="mailInput"
                       required 
                       placeholder="example@mail.com" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <div>
                <input type="password" 
                       id="passInput"
                       required 
                       placeholder="Enter password" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <input type="password" 
                       id="confirmInput"
                       required 
                       placeholder="Confirm password" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
            <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-300 flex items-center gap-3 w-full">
                <input type="date" 
                       id="dateInput"
                       value="2025-03-18" 
                       class="flex-grow text-left text-gray-800 outline-none border-none p-0 cursor-pointer">
            </div>

            <div class="flex flex-col gap-3 mt-6">
                <button type="submit" class="bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 transition-colors">Register</button>
            </div>

            <div class="text-center">
                <a href="/src/login.html" class="text-sm text-blue-600 hover:underline">Already have an account? Login</a>
            </div>
        </form>
        <div id="registerMessage" class="mt-2 text-center text-sm"></div>
    </div>
    <script src="register.js"></script>
</body>
</html>
