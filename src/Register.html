<!DOCTYPE html>
<html lang="en">
  <head>
      
      <script src="https://cdn.tailwindcss.com"></script>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Register</title>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <form id="registerForm" action="/src/register.html" method="post">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Register</h2>
            
            <div>
                <input type="text" 
                       required 
                       placeholder="Enter username" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none invalid:border-red-500 transition-all">
            </div>
            
            <div>
                <input type="email" 
                required 
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+.com$"
                title="נא להזין כתובת אימייל תקינה המסתיימת ב-.com"
                placeholder="example@mail.com" 
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none invalid:border-red-500 transition-all">
            </div>
            


            <div>
                <input type="password" 
                       required 
                       placeholder="Enter password" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none invalid:border-red-500 transition-all">
            </div>

            <div>
                <input type="password" 
                       required 
                       placeholder="Enter password" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none invalid:border-red-500 transition-all">
            </div>
            
        

        <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>

        <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-center gap-3 w-full max-w-sm">
    
    <div onclick="document.getElementById('dob-input').showPicker()" class="cursor-pointer hover:opacity-70 transition-opacity">
        <svg class="w-6 h-6 text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-6h.008v.008H12v-.008zM12 15h.008v.008H12V15zm0 2.25h.008v.008H12v-.008zM9.75 15h.008v.008H9.75V15zm0 2.25h.008v.008H9.75v-.008zM7.5 15h.008v.008H7.5V15zm0 2.25h.008v.008H7.5v-.008zM14.25 15h.008v.008h-.008V15zm0 2.25h.008v.008h-.008v-.008zM16.5 15h.008v.008H16.5V15zm0 2.25h.008v.008H16.5v-.008z" />
        </svg>
    </div>
    
    <input type="date" 
           id="dob-input"
           value="2025-03-18" 
           onclick="this.showPicker()"
           class="flex-grow text-right text-lg text-gray-800 font-sans outline-none border-none p-0 cursor-pointer">
</div>


            <div class="flex flex-col gap-3 mt-6">
                <button type="submit" class="bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 transition-colors">Register</button>
            </div>

            <div class="text-center">
                <a href="#" class="text-sm text-blue-600 hover:underline">Already have an account? Login</a>
            </div>
        </form>
        <div id="registerMessage" class="mt-2 text-red-500 text-center text-sm"></div>
    </div>
    <script src="register.js"></script>
</body>
</html>
