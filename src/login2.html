<!DOCTYPE html>
<html lang="en">
  <head>
     
      <script src="https://cdn.tailwindcss.com"></script>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Login Page</title>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <form id="loginForm" action="/src/login" method="post">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h2>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username or email</label>
                <input type="text" 
                       required 
                       placeholder="Enter username" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none invalid:border-red-500 transition-all">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" 
                       required 
                       placeholder="Enter password" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none invalid:border-red-500 transition-all">
            </div>
            
            <div class="flex flex-col gap-3 mt-6">
                <button type="submit" 
                        class="bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 transition-colors">
                    Login
                </button>
                <button type="button" 
                        class="bg-gray-200 text-gray-700 py-2 rounded-md font-semibold hover:bg-gray-300 transition-colors">
                    Register
                </button>
            </div>

            <div class="text-right mt-4">
                <a href="#" class="block text-right mt-4 text-blue-500 hover:underline" onclick="alert('Forgot password functionality to be implemented.');">Forgot Password?</a>
            </div>
        </form>
        <div id="loginMessage" class="mt-2 text-red-500 text-center text-sm"></div>
    </div>
    <script src="login.js"></script>
</body>
</html>
